networks:
  traefik:
    name: traefik_web
    driver: bridge
  postgres:
    name: postgres
    driver: bridge
  redis:
    name: redis
    driver: bridge
  mail:
    name: mail
    driver: bridge

volumes:
  postgres_data:
    name: postgres_data
  redis_data:
    name: redis_data

services:
  traefik:
    image: traefik:latest
    container_name: "traefik"
    restart: unless-stopped
    ports:
      - ${HTTP_PORT:-80}:80
      - ${HTTPS_PORT:-443}:443
    networks:
      - traefik
    security_opt:
      - no-new-privileges:true
    volumes:
      - ./data/certs:/etc/certs:ro
      - ./data/traefik/logs:/var/log/traefik:rw
      - ./traefik/dynamic/dynamic-conf.yaml:/etc/traefik/dynamic-conf.yaml:rw
      - ./data/certs.yaml:/etc/traefik/certs.yaml:ro
      - ./traefik/traefik.yaml:/etc/traefik/traefik.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    labels:
      - "traefik.enable=true"
      # - "traefik.pilot.token=${PILOT_TOKEN}"
      # - "traefik.http.routers.dashboard.tls=true"
      - "traefik.http.routers.dashboard.rule=Host(`${DASHBOARD_DOMAIN}`)"
      - "traefik.http.routers.dashboard.service=api@internal"

  postgres:
    image: postgres:latest
    container_name: "postgres"
    depends_on:
      - traefik
    volumes:
      - postgres_data:/var/lib/postgresql/data:rw
    ports:
      - ${POSTGRES_PORT:-5432}:5432
    environment:
      - POSTGRES_USER=${POSTGRES_ROOT_USER}
      - POSTGRES_PASSWORD=${POSTGRES_ROOT_PASS}
      # - POSTGRES_DB=${POSTGRES_DB:-default_db}
      # - PGDATA=/var/lib/postgresql/data
    labels:
      - "traefik.enable=false"
    networks:
      - postgres
      - traefik

  redis:
    image: redis:latest
    container_name: "redis"
    volumes:
      - redis_data:/data
    ports:
      - ${REDIS_PORT:-6379}:6379
    labels:
      - "traefik.enable=false"
    networks:
      - redis
      - traefik

  mail:
    image: axllent/mailpit:latest
    container_name: "mailpit"
    ports:
      - ${MAILPIT_PORT:-1025}:1025
      - ${MAILPIT_DASHBOARD_PORT:-8025}:8025
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik_web"
      # - "traefik.http.routers.mail.tls=true"
      - "traefik.http.routers.mail.rule=Host(`${MAIL_DOMAIN}`)"
      - "traefik.http.services.mail.loadbalancer.server.port=8025"
      - "traefik.http.services.mail.loadbalancer.passhostheader=true"
    networks:
      - mail
      - traefik
